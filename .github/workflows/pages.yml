name: Deploy to GitHub Pages (gh-pages branch)

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Deploy to gh-pages
        env:
          REPO: ${{ github.repository }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          tmpdir=$(mktemp -d)
          # Copy site files (exclude workflow dir and .git)
          rsync -av --exclude='.git' --exclude='.github' ./ "$tmpdir/site/"
          cd "$tmpdir/site"
          git init
          git add -A
          git commit -m "chore: deploy site to gh-pages [skip ci]" || true
          git branch -M gh-pages
          git remote add deploy "https://x-access-token:${TOKEN}@github.com/${REPO}.git"
          git push --force deploy gh-pages
